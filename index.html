<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AIA Night Program</title>

<!-- Preload ONLY first image -->
<link rel="preload" as="image" href="电子节目单_01.jpg">

<style>
body {
  margin: 0;
  background: #ffffff;
}

/* Global image optimization */
img {
  width: 100%;
  height: auto;
  display: block;
}
</style>

</head>

<body>

<!-- First image: highest priority -->
<img src="电子节目单_01.jpg" loading="eager" decoding="async" fetchpriority="high">

<!-- Next 2 images: medium priority (above the fold buffer) -->
<img src="电子节目单_02.jpg" loading="lazy" decoding="async" fetchpriority="high">
<img src="电子节目单_03.jpg" loading="lazy" decoding="async" fetchpriority="high">

<!-- Remaining images: lowest priority -->
<img src="电子节目单_04.jpg" loading="lazy" decoding="async" fetchpriority="low">
